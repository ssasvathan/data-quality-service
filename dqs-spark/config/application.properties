# dqs-spark component configuration
# Each component has its own config — no shared root-level config
#
# Environment overlay: set DQS_ENV=dev|prod (env var) or -Ddqs.env=dev|prod
# (system property) to load application-{env}.properties on top of this file.
#
# Placeholder syntax: ${VAR_NAME} or ${VAR_NAME:default_value}
# Resolved from: system properties -> environment variables -> default value

# PostgreSQL connection
db.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
db.user=${DB_USER:postgres}
db.password=${DB_PASSWORD:localdev}
db.driver=org.postgresql.Driver

# Spark job settings
spark.app.name=dqs-spark
spark.master=local[*]
